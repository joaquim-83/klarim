name: Deploy Klarim

# CI/CD: every push to main runs the test suite; if it passes, the change is
# deployed to the GCP VM over SSH. The deploy job never runs if tests fail
# (it `needs: test`).
#
# Auth uses Workload Identity Federation (keyless, OIDC) — no service-account
# JSON key. The project enforces the org policy
# iam.disableServiceAccountKeyCreation, so downloadable keys are not an option;
# WIF is also the Google-recommended approach for GitHub Actions.
#
# Required GitHub secrets (Settings > Secrets and variables > Actions) — set
# these MANUALLY; this repo never stores credentials:
#   GCP_WIF_PROVIDER  Workload Identity provider resource name, e.g.
#     projects/10946387758/locations/global/workloadIdentityPools/github-pool/providers/github-provider
#   GCP_SA_EMAIL      klarim-deploy@project-b08050df-fa4e-49ac-919.iam.gserviceaccount.com
#   GCP_PROJECT_ID    e.g. project-b08050df-fa4e-49ac-919
#   GCP_INSTANCE      e.g. instance-20260706-112125
#   GCP_ZONE          e.g. us-central1-a
#
# The provider is locked to the repo joaquim-83/klarim (attribute condition), and
# the SA klarim-deploy has roles/iam.workloadIdentityUser only for that repo.

on:
  push:
    branches: [main]
  # Allow manual re-runs from the Actions tab.
  workflow_dispatch:

# Avoid overlapping deploys if pushes land back-to-back.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # WeasyPrint (a declared dependency) links against these at import time.
      # The current test suite does not import it, but installing the libs keeps
      # the job green if a future test does.
      - name: Install WeasyPrint system libraries
        run: |
          # Repos de terceiros pré-instalados no runner (packages.microsoft.com)
          # às vezes ficam com assinatura inválida ("no longer signed / NOSPLIT")
          # e quebram o apt-get update com exit 100. Não precisamos deles para as
          # libs do WeasyPrint, então os removemos antes de atualizar.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* \
                     /etc/apt/sources.list.d/*azure* 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libcairo2 shared-mime-info

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  # KL-51: valida o build do Astro (plataforma pública) ANTES do deploy. Se o
  # build quebrar, o deploy nem começa — o `web`/Astro só sobe se compilar aqui.
  build-web:
    name: Build web (Astro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install & build
        working-directory: web
        run: |
          npm ci
          npm run build

  # KL-51: valida a config do Nginx (nginx -t) ANTES do deploy. Uma config
  # inválida derruba o container `web` (o site inteiro) e os health checks do
  # deploy batem em api/astro DIRETO — não pegariam o Nginx quebrado. Gate no CI.
  nginx-check:
    name: Nginx config check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate http.conf + rendered https.conf with nginx -t
        run: |
          set -euo pipefail
          D=klarim.net
          # http.conf não usa certificado — valida a sintaxe direto.
          docker run --rm \
            -v "$PWD/frontend/nginx/http.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:alpine nginx -t
          # https.conf.template: renderiza só ${DOMAIN} (como o entrypoint) e gera
          # um certificado dummy para o nginx -t conseguir carregar ssl_certificate.
          mkdir -p le/live/"$D"
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout le/live/"$D"/privkey.pem -out le/live/"$D"/fullchain.pem \
            -subj "/CN=$D" 2>/dev/null
          DOMAIN="$D" envsubst '${DOMAIN}' \
            < frontend/nginx/https.conf.template > https.rendered.conf
          docker run --rm \
            -v "$PWD/https.rendered.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v "$PWD/le:/etc/letsencrypt/live:ro" \
            nginx:alpine nginx -t

  deploy:
    name: Deploy to GCP VM
    needs: [test, build-web, nginx-check]
    runs-on: ubuntu-latest
    # Only deploy the real branch, never a fork PR or other ref.
    if: github.ref == 'refs/heads/main'
    # Required for Workload Identity Federation: the job must be allowed to mint
    # an OIDC token that GCP exchanges for short-lived credentials.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy over SSH
        # `gcloud compute ssh` generates an ephemeral key pair and injects the
        # public key via instance metadata (needs compute.instances.setMetadata),
        # then runs the deploy script on the VM. --quiet disables interactive
        # prompts (host-key, key generation) so it works headless in CI.
        #
        # Runs the script with `sudo`: CI logs in as the service-account-derived
        # Linux user, which does NOT own /opt/klarim nor belong to the docker
        # group. GCE grants that user passwordless sudo, so `sudo bash …` is the
        # portable way to git-pull and drive docker regardless of login user.
        # (An interactive operator logged in as the owning user can drop `sudo`.)
        #
        # Connectivity: this connects to the VM's external IP on port 22 — the
        # firewall must allow it. For a no-public-port-22 setup, add
        #   --tunnel-through-iap
        # and grant the SA roles/iap.tunnelResourceAccessor.
        run: |
          gcloud compute ssh "${{ secrets.GCP_INSTANCE }}" \
            --zone "${{ secrets.GCP_ZONE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --quiet \
            --command "sudo bash /opt/klarim/deploy/deploy.sh"
