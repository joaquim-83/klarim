# Klarim — local stack: PostgreSQL + Redis + API + Worker.
#
#   cp .env.example .env    # then edit .env
#   docker compose up --build
#
# API:     http://localhost:8000
# Worker:  consumes the Redis queue 'klarim:scan_queue' and writes reports back.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-klarim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-klarim}
    ports:
      # Bind to localhost only — the DB must not be reachable from the VM's
      # public IP. Reachable inside the compose network via the service name.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klarim}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      # Bind to localhost only — Redis must not be reachable from the VM's
      # public IP. Reachable inside the compose network via the service name.
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-klarim}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-klarim}
      REDIS_URL: redis://redis:6379/0
    ports:
      # Bind to localhost only — o público acessa via Nginx (serviço web, :80).
      # Continua acessível na VM para debug (curl localhost:8000).
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend React (build estático) + Nginx como reverse proxy para a API.
  # Serve HTTP até existir o certificado; depois HTTPS (ver frontend/entrypoint).
  web:
    build: ./frontend
    restart: unless-stopped
    environment:
      # Vazio => modo HTTP. Definido (no .env da VM) + cert presente => HTTPS.
      DOMAIN: ${DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certificados Let's Encrypt (host) e webroot do ACME challenge.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "scanner.main", "--worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-klarim}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-klarim}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  # Discovery Worker (KL-11) — descobre alvos via CT logs a cada 6h e enfileira.
  discovery:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "discovery.worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-klarim}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-klarim}
      REDIS_URL: redis://redis:6379/0
      DISCOVERY_BATCH_SIZE: ${DISCOVERY_BATCH_SIZE:-100}
      DISCOVERY_INTERVAL_HOURS: ${DISCOVERY_INTERVAL_HOURS:-6}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
