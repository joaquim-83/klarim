# Klarim — local stack: PostgreSQL + Redis + API + Worker.
#
#   cp .env.example .env    # then edit .env
#   docker compose up --build
#
# API:     http://localhost:8000
# Worker:  consumes the Redis queue 'klarim:scan_queue' and writes reports back.

# Rotação de logs — CRÍTICO. Sem isto, os logs JSON dos containers (sobretudo o
# httpx verboso do discovery/batch) crescem SEM LIMITE e enchem o disco da VM,
# quebrando tudo. Cada serviço fica limitado a 3×10MB = 30MB de log. Aplicado a
# todos via âncora YAML `*default-logging`.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-klarim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-klarim}
    ports:
      # Bind to localhost only — the DB must not be reachable from the VM's
      # public IP. Reachable inside the compose network via the service name.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-klarim}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      # Bind to localhost only — Redis must not be reachable from the VM's
      # public IP. Reachable inside the compose network via the service name.
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    logging: *default-logging
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    # KL-32: monta o dir de deploy LEITURA+ESCRITA — o MCP grava o worker_control.json
    # (os workers leem o mesmo arquivo pelo mount ro).
    volumes:
      - ./:/klarim-control
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-klarim}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-klarim}
      REDIS_URL: redis://redis:6379/0
      WORKER_CONTROL_FILE: ${WORKER_CONTROL_FILE:-/klarim-control/worker_control.json}
    ports:
      # Bind to localhost only — o público acessa via Nginx (serviço web, :80).
      # Continua acessível na VM para debug (curl localhost:8000).
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Plataforma pública (Astro SSR standalone, KL-51). Node server em :4321; o
  # Nginx (web) faz proxy das rotas públicas para cá. Publicado só em localhost
  # (debug: curl localhost:4321) — o público chega via Nginx.
  astro:
    build: ./web
    restart: unless-stopped
    logging: *default-logging
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      # URL interna da API (rede do compose) para os fetches SSR do Astro
      # (ex.: POST do formulário de contato → /contact).
      KLARIM_API_URL: http://api:8000
    ports:
      - "127.0.0.1:4321:4321"
    depends_on:
      - api

  # Nginx: reverse proxy + TLS self-healing + security headers. Serve o painel
  # admin (build Vite estático, /painel) e faz proxy das rotas públicas → Astro e
  # das rotas /api e /mcp → API. Serve HTTP até existir o certificado; depois
  # HTTPS (ver frontend/docker-entrypoint.d/40-klarim-tls.sh).
  web:
    build: ./frontend
    restart: unless-stopped
    logging: *default-logging
    environment:
      # Vazio => modo HTTP. Definido (no .env da VM) + cert presente => HTTPS.
      DOMAIN: ${DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certificados Let's Encrypt (host) e webroot do ACME challenge.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - astro

  worker:
    build: .
    restart: unless-stopped
    logging: *default-logging
    command: ["python", "-m", "scanner.main", "--worker"]
    env_file: .env
    # KL-32: lê o worker_control.json (pausa/retoma o scan worker sem redeploy).
    # KL-77 (Fase 2): arquiva o response bruto de cada scan no GCS. As vars GCS_ENABLED,
    # GCS_BUCKET e (opcional) GOOGLE_APPLICATION_CREDENTIALS vêm do env_file (.env). O
    # caminho PREFERÍVEL é ADC via SA da VM (sem key file) — nada a montar. Se usar key
    # JSON, descomente o mount read-only abaixo e aponte GOOGLE_APPLICATION_CREDENTIALS
    # para /app/gcs-key.json no .env.
    volumes:
      - ./:/klarim-control:ro
      # - ./gcs-key.json:/app/gcs-key.json:ro   # KL-77: só se NÃO usar ADC
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-klarim}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-klarim}
      REDIS_URL: redis://redis:6379/0
      WORKER_CONTROL_FILE: ${WORKER_CONTROL_FILE:-/klarim-control/worker_control.json}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  # Discovery Worker (KL-11) — descobre alvos via CT logs a cada 6h e enfileira.
  discovery:
    build: .
    restart: unless-stopped
    logging: *default-logging
    command: ["python", "-m", "discovery.worker"]
    env_file: .env
    # Kill-switch de alertas (KL-27): monta o dir de deploy (onde vive o flag
    # STOP_ALERTS) read-only; o worker checa ALERTS_STOP_FILE a cada ciclo. Bind
    # mount ao vivo → `touch`/`rm STOP_ALERTS` no host pausa/resume sem redeploy.
    volumes:
      - ./:/klarim-control:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-klarim}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-klarim}
      REDIS_URL: redis://redis:6379/0
      DISCOVERY_BATCH_SIZE: ${DISCOVERY_BATCH_SIZE:-100}
      DISCOVERY_INTERVAL_MINUTES: ${DISCOVERY_INTERVAL_MINUTES:-30}
      WORKER_CONTROL_FILE: ${WORKER_CONTROL_FILE:-/klarim-control/worker_control.json}  # KL-32
      ALERTS_STOP_FILE: ${ALERTS_STOP_FILE:-/klarim-control/STOP_ALERTS}
    # Watchdog (KL-19): se o event loop travar, os heartbeats no Redis expiram
    # (TTL 600s); após 3 falhas (~6min) o Docker reinicia o container.
    healthcheck:
      test: ["CMD", "python", "-m", "discovery.healthcheck"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 150s
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
