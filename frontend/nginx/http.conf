# Config HTTP (usada enquanto NÃO existe certificado Let's Encrypt).
# Serve o site na porta 80 e expõe o webroot do ACME challenge para que o
# Certbot consiga emitir o certificado sem derrubar o Nginx (modo webroot).
server {
    listen 80;
    server_name _;

    # Não expor a versão do Nginx (o próprio check 08 do Klarim reprova isso).
    server_tokens off;

    # Desafio ACME (Let's Encrypt) — precede o fallback da SPA.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Sem cert (HTTP): a raiz do subdomínio do painel vai ao login; os demais
    # hosts servem a SPA normalmente. (http.conf não passa por envsubst, então
    # detectamos o subdomínio pelo prefixo do $host em vez de ${DOMAIN}.)
    location = / {
        if ($host ~* ^painel\.) { return 302 /painel/login; }
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
