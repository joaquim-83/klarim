# Config HTTP (usada enquanto NÃO existe certificado Let's Encrypt).
# Serve o site na porta 80 e expõe o webroot do ACME challenge para que o
# Certbot consiga emitir o certificado sem derrubar o Nginx (modo webroot).
server {
    listen 80;
    server_name _;

    # Não expor a versão do Nginx (o próprio check 08 do Klarim reprova isso).
    server_tokens off;

    # Desafio ACME (Let's Encrypt) — `^~` garante prioridade sobre os regex de
    # segurança abaixo (senão o `location ~ /\.` bloquearia o /.well-known).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # KL-63 — OAuth 2.1 discovery (RFC 9728 / 8414). `^~` tem prioridade sobre o
    # `location ~ /\.` (que senão devolveria 404 para /.well-known/oauth-*). Proxy
    # IDENTIDADE (sem strip) para a API, que serve os dois metadata na raiz.
    location ^~ /.well-known/oauth- {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $klarim_api api:8000;
        proxy_pass http://$klarim_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # KL-65 — security.txt (RFC 9116). `location =` (exato) vence o `~ /\.` abaixo.
    location = /.well-known/security.txt {
        default_type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=86400" always;
        alias /etc/nginx/klarim_security.txt;
    }

    # Segurança (self-audit): paths sensíveis conhecidos retornam 404 em vez de
    # 200 com a SPA. Não vazam nada (é só o app React), mas confundem scanners.
    location ~ /\. { return 404; }                                            # .env .git .htaccess…
    location ~* \.(php|sql|bak|log|ya?ml|toml|ini|conf|config)$ { return 404; }
    location ~* ^/(phpinfo|server-status|server-info|wp-admin|wp-login|administrator|admin\.php) { return 404; }
    # Diretórios "suspeitos" que scanners sondam — 404 em vez de 200 com a SPA. NÃO
    # afeta /api/, /mcp/ (prefixos, e a âncora ^/ não casa /api/admin) nem /painel/.
    location ~* ^/(backup|uploads|admin|internal|debug|test|staging|tmp|temp|logs|private|secret|dump)(/|$) { return 404; }

    # KL-51 — páginas institucionais/legais + fluxo de scan + contas (f3) + assets
    # do Astro (nova plataforma) vão ao container `astro`. Resolver dinâmico (/api/).
    location ~ ^/(termos|privacidade|sobre|contato|scan|cadastrar|entrar|confirmar|confirmado|recuperar-senha|dashboard|laudo|planos|favicon\.svg|robots\.txt|track\.js|theme\.js|header\.js|planos-auth\.js)(/|$) {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $klarim_astro astro:4321;
        proxy_pass http://$klarim_astro;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ^~ /_astro/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $klarim_astro astro:4321;
        proxy_pass http://$klarim_astro;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # KL-51 fase 1 — painel admin migrado para o Astro. SÓ as rotas já migradas vão ao
    # container `astro`; as demais /painel/* (alvos, scans, alertas, leads, analytics,
    # sistema e detalhes) continuam na SPA Vite (location / abaixo) — coexistência sem
    # regressão. KL-51 fase 2: TODO o /painel migrado → `^/painel(/|$)` (App.jsx do Vite sem /painel).
    location ~ ^/painel(/|$) {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $klarim_astro astro:4321;
        proxy_pass http://$klarim_astro;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Sem cert (HTTP): a raiz do subdomínio do painel vai ao login; os demais
    # hosts servem a SPA normalmente. (http.conf não passa por envsubst, então
    # detectamos o subdomínio pelo prefixo do $host em vez de ${DOMAIN}.)
    location = / {
        if ($host ~* ^painel\.) { return 302 /painel/login; }
        # KL-51: a raiz (host não-painel) é a landing do Astro.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $klarim_astro astro:4321;
        proxy_pass http://$klarim_astro;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy da API. Resolver dinâmico (DNS do Docker em 127.0.0.11) + upstream em
    # variável forçam o Nginx a RE-RESOLVER o IP do container `api` a cada request
    # (TTL 10s), em vez de cachear o IP no boot. Sem isto, quando o `api` é recriado
    # (novo IP) e o `web` não, o Nginx fica com o IP velho e responde 502 (o bug do
    # login do painel). Como o proxy_pass usa variável, o strip do prefixo /api/ é
    # feito manualmente pelo rewrite.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $klarim_api api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$klarim_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Streamable HTTP do MCP: o endpoint é /mcp/ (com barra). O /mcp "pelado" cairia
    # no location / (SPA) — redireciona para /mcp/ preservando a query (?token=).
    location = /mcp { return 308 /mcp/$is_args$args; }

    # Servidor MCP (KL-18) — Streamable HTTP (/mcp/) + SSE (/mcp/sse). Buffering/cache
    # DESLIGADOS e Connection '' são obrigatórios (senão o Nginx bufferiza o stream).
    # Mesmo resolver dinâmico do /api/. `access_log off`: a auth pode vir em ?token=
    # — não deve vazar nos logs. Identidade (sem rewrite): o proxy_pass com variável
    # repassa o $uri original (/mcp/, /mcp/sse).
    location /mcp/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $klarim_api api:8000;
        proxy_pass http://$klarim_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
        access_log off;
    }
}
