# Security headers do Klarim (KL-51 f3 fix — score 100). Snippet compartilhado via
# `include` pelo server block e por cada location que tem `add_header` próprio (um
# add_header num location QUEBRA a herança dos do server — por isso o include é
# repetido). Todos com `always` (aparecem em 4xx/5xx também).
#
# CSP: `script-src` SEM 'unsafe-inline' — os 3 scripts inline do Astro (o toggle de
# auth do Header + os 2 do runtime de island) entram por **hash SHA-256** (estáveis:
# não mexemos no Header nem na versão do Astro). Todo script NOVO é externo
# (public/track.js, chunks das islands) → coberto por 'self'. `style-src` mantém
# 'unsafe-inline' (o check só reprova script-src/default-src; React/Recharts usam
# estilos inline). COEP require-corp é seguro: o site é 100% same-origin e todo
# recurso servido leva CORP same-origin.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com 'sha256-gjeY8JXi8XTHS/pVCtKzDuZlK9ifyo55YQ7cgcTYxw0=' 'sha256-QzWFZi+FLIx23tnm9SBU4aEgx4x8DsuASP07mfqol/c=' 'sha256-SaCkFfPruIdTXT8/97JArQmGxiJAL2o4bBDvSgJ5y3Q='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://cloudflareinsights.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
