# Security headers do Klarim (KL-51 f3 fix — score 100). Snippet compartilhado via
# `include` pelo server block e por cada location que tem `add_header` próprio (um
# add_header num location QUEBRA a herança dos do server — por isso o include é
# repetido). Todos com `always` (aparecem em 4xx/5xx também).
#
# CSP: `script-src` SEM 'unsafe-inline' — os scripts inline do Astro (toggle de auth do
# Header + 2 do runtime de island + o anti-FOUC de tema do KL-87 + o init do GA4/gtag do
# KL-92 P4) entram por **hash SHA-256** (5 hashes; estáveis — não mexemos no Header, no
# runtime do Astro, no snippet de tema nem no init do gtag; se editar qualquer um, recalcule
# o hash: `printf '%s' '<conteúdo exato>' | openssl dgst -sha256 -binary | openssl base64`).
# KL-92 P4: Cloudflare Web Analytics (`static.cloudflareinsights.com`, era o único script SEM SRI
# → travava o score 100) foi trocado por **Google Analytics 4**: `script-src` inclui
# `www.googletagmanager.com` (loader) + o hash do init inline; `connect-src`/`img-src` liberam
# `*.google-analytics.com`. Todo script NOVO próprio é externo (public/track.js, public/theme.js,
# chunks das islands) → coberto por 'self'. `style-src` mantém
# 'unsafe-inline' (o check só reprova script-src/default-src; React/Recharts usam
# estilos inline). COEP require-corp é seguro: o site é 100% same-origin e todo
# recurso servido leva CORP same-origin.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com 'sha256-gjeY8JXi8XTHS/pVCtKzDuZlK9ifyo55YQ7cgcTYxw0=' 'sha256-QzWFZi+FLIx23tnm9SBU4aEgx4x8DsuASP07mfqol/c=' 'sha256-SaCkFfPruIdTXT8/97JArQmGxiJAL2o4bBDvSgJ5y3Q=' 'sha256-bBi9+iLHn+rADpjT/TZMjeiq/m+PjyYZpP3Iy0WdGyQ=' 'sha256-qzH7zDtLe593g3bHtjaiMTvw04nqU/2iiMJnv9osNzA='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.google-analytics.com; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
