# Klarim — Nginx de DESENVOLVIMENTO (KL-90 P0). HTTP puro.
#
# Sem SSL, sem HSTS/CSP/security headers, sem rate limit, sem headers de
# Cloudflare (não existe CF no local) — tudo isso atrapalha o debug. Montado em
# /etc/nginx/conf.d/default.conf pelo docker-compose.dev.yml.
#
# NÃO usar em produção: a config real é frontend/nginx/http.conf +
# https.conf.template (com TLS, CSP e todos os headers de segurança).

# HMR do Astro/Vite usa WebSocket. Este map (contexto http — arquivos em conf.d
# são incluídos no http block) traduz o header Upgrade para o Connection certo.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    # A API espera os paths SEM o prefixo /api (o Nginx de produção também
    # reescreve /api/... -> /...). O trailing slash no proxy_pass strippa /api/.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        # Scans rodam inline e sites lentos podem demorar — folga no timeout.
        proxy_connect_timeout 10s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Astro dev server (páginas públicas + painel). O upgrade de WebSocket é
    # necessário para o hot reload (HMR) funcionar através do proxy.
    location / {
        proxy_pass http://astro:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
