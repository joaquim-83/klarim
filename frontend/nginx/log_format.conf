# KL-92 Prompt 3 — access_log em formato parseável para o tracking server-side.
#
# Este arquivo é incluído no contexto `http {}` (o Dockerfile o copia para
# /etc/nginx/conf.d/00-klarim-log.conf; o nginx.conf base faz `include conf.d/*.conf`
# DENTRO do http). NÃO é um server block — só define o formato e um destino de log.
#
# O container `api` (parser `api/nginx_log_parser.py`) lê /var/log/klarim/access.log e
# insere na tabela access_log do Postgres. O `access_log` do stdout (formato `main`, do
# nginx.conf base) continua ativo → os `docker logs` do Nginx seguem intactos (dois
# `access_log` no mesmo nível = escreve nos dois). O IP real vem do `CF-Connecting-IP`
# (Cloudflare); o país do `CF-IPCountry`.
#
# Campos: ip - user [tempo] "request" status bytes "referer" "user_agent" country=.. rt=..

log_format klarim '$http_cf_connecting_ip - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'country=$http_cf_ipcountry rt=$request_time';

access_log /var/log/klarim/access.log klarim;
