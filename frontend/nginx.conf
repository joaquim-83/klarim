server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Assets com hash no nome podem ser cacheados agressivamente.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: qualquer rota do cliente cai no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para a API FastAPI (mesmo network do compose).
    # A barra final em proxy_pass remove o prefixo /api/ do caminho.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Os scans levam ~30s; os PDFs, mais ainda. Timeouts generosos.
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
